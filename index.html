<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Task Tracker · month filter + mobile suggestions</title>
    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --text-main: #1e293b; 
            --text-muted: #64748b;
            --danger: #ef4444;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --name-color: #5C5DC4; 
        }

        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px 15px; 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 80px; 
        }

        .main-container { width: 100%; max-width: 500px; }

        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: var(--card-shadow); 
            margin-bottom: 24px; 
            border: 1px solid #f1f5f9; 
        }

        .divider {
            border-top: 2px dotted #e2e8f0;
            margin: 20px 0;
            width: 100%;
        }

        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-details h1 { margin: 0; color: var(--name-color); font-size: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
        .user-details p { margin: 4px 0 0; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        .pfp { width: 52px; height: 52px; border-radius: 50%; cursor: pointer; border: 2px solid var(--primary); object-fit: cover; background: #eff6ff; }

        .stats-container { display: flex; gap: 12px; }
        .stat-box { flex: 1; background: #f1f5f9; padding: 16px; border-radius: 12px; text-align: center; }
        .stat-box small { display: block; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 4px; }
        .stat-box b { font-size: 1.5rem; color: var(--primary); font-weight: 800; }

        .card-title { color: var(--primary); margin: 0 0 20px 0; font-size: 1.1rem; font-weight: 800; }
        
        /* base input style (unchanged) */
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 1rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: border-color 0.2s; 
        }
        input:focus, select:focus { border-color: var(--primary); }

        /* custom suggestion container */
        .input-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 12px;
        }
        .input-wrapper input {
            margin-bottom: 0; /* margin handled by wrapper */
        }

        .suggestion-box {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            left: auto;
            min-width: 180px;
            max-width: 100%;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            z-index: 50;
            display: none;
            overflow: hidden;
            font-size: 0.85rem;   /* smaller than input */
        }
        .suggestion-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
            background: white;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: #f1f5f9; }
        .suggestion-box.show { display: block; }

        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }

        .section-label { color: var(--primary); font-weight: 800; margin: 10px 0 15px 4px; font-size: 1.1rem; }
        
        /* filter row with month & pincode – inputs same size as task card */
        .filter-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-row .month-input {
            flex: 0 0 150px;
            padding: 14px;          /* same as other inputs */
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .filter-row .pin-input {
            flex: 1;
            min-width: 180px;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
        }
        .filter-stats {
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 0.95rem;
        }
        .filter-stats div { margin-bottom: 8px; }
        .filter-stats .company-line { 
            margin-left: 4px; 
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* month history cards (preserved style) */
        .month-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: var(--card-shadow); overflow: hidden; margin-bottom: 12px; }
        .month-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #fff; border-bottom: 1px solid #f1f5f9; }
        .month-title { font-weight: 800; font-size: 1rem; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .month-total-pill { color: var(--primary); font-weight: 800; font-size: 1.1rem; }

        .day-group { border-bottom: 1px solid #f1f5f9; }
        .day-header { padding: 12px 20px; background: #e2e8f0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }
        
        .history-list { display: none; }
        .day-content { display: none; }

        /* Updated record-item styles for proper alignment */
        .record-item { 
            padding: 16px 20px; 
            border-top: 1px solid #f1f5f9; 
            background: #fff; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; /* changed from center to align top */
        }
        .record-info {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 2px;               /* one-backspace gap between number and content */
            flex: 1;
        }
        .number-badge { 
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 0.9rem; 
            min-width: 24px;         /* fixed width for alignment */
        }
        .record-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .company-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .pin-line {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        .action-side { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-left: 12px;       /* keep some distance from text */
        }
        .record-count { 
            font-weight: 800; 
            font-size: 1.1rem; 
            color: var(--text-main); 
            margin-right: 5px; 
        }
        
        .icon-btn { border: none; background: none; padding: 8px; cursor: pointer; border-radius: 8px; transition: background 0.2s; font-size: 1.1rem; -webkit-tap-highlight-color: transparent; }
        .edit-icon { color: var(--primary); }
        .delete-icon { color: var(--danger); }

        #toast { 
            visibility: hidden; min-width: 250px; background-color: #334155; color: #fff; 
            text-align: center; border-radius: 12px; padding: 16px; position: fixed; 
            z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%);
            font-weight: 600; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 28px; border-radius: 20px; width: 90%; max-width: 380px; }
        
        .delete-confirm-box { text-align: center; }
        .delete-confirm-box h3 { margin-top: 0; color: var(--text-main); }
        .delete-confirm-box p { color: var(--text-muted); margin-bottom: 24px; }
        .modal-btns { display: flex; gap: 12px; }
        .btn-cancel { flex: 1; background: #f1f5f9; color: var(--text-main); border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-confirm-del { flex: 1; background: var(--danger); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="toast">Message</div>

<div class="main-container">
    <!-- profile card unchanged -->
    <div class="card">
        <div class="profile-header">
            <div class="user-details">
                <h1 id="disp-name">Loading...</h1>
                <p id="disp-id">ID: ---</p>
            </div>
            <img id="disp-img" src="" class="pfp" onclick="toggleModal('modal')">
        </div>
        <div class="stats-container">
            <div class="stat-box"><small>Today</small><b id="daily-total">0</b></div>
            <div class="stat-box"><small>This Month</small><b id="monthly-total">0</b></div>
        </div>
    </div>

    <!-- FILTER BY PINCODE + MONTH (updated format) -->
    <div class="card">
        <h3 class="card-title">Filter by Pincode & Month</h3>
        <div class="filter-row">
            <input type="month" id="filter-month" class="month-input" value="">
            <input type="number" id="filter-pin-input" class="pin-input" placeholder="Enter Pincode" oninput="runFilter()">
        </div>
        <div class="divider"></div>
        <div id="filter-output" class="filter-stats">
            <div style="color: var(--text-muted);">Enter pincode and select month</div>
        </div>
    </div>

    <!-- ADD NEW TASK with custom suggestion boxes and auto-capitalize -->
    <div class="card" id="task-card-section">
        <h3 class="card-title">Add New Task</h3>
        
        <div class="input-wrapper">
            <input type="text" id="company" placeholder="Company Name" autocomplete="off" oninput="handleCompanyInput(); forceCap(this);">
            <div id="company-suggestions" class="suggestion-box"></div>
        </div>

        <div class="input-wrapper">
            <input type="number" id="pincode" placeholder="Area Pincode" autocomplete="off" oninput="handlePincodeInput()">
            <div id="pincode-suggestions" class="suggestion-box"></div>
        </div>

        <input type="number" id="count" placeholder="Number of Tasks">
        <input type="hidden" id="edit-idx" value="-1">
        <button class="btn-save" id="btn-text" onclick="saveData()">Save Entry</button>
    </div>

    <div class="section-label">Recent Activity</div>
    <div id="history-container"></div>
</div>

<!-- modals unchanged -->
<div id="modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="color:var(--primary); margin-top:0; font-weight:800;">Edit Profile</h3>
        <input type="text" id="edit-name" placeholder="Name">
        <input type="text" id="edit-emp-id" placeholder="Employee ID">
        <input type="text" id="edit-img" placeholder="Profile Pic URL">
        <button class="btn-save" onclick="updateProfile()">Update Profile</button>
        <button style="width:100%; background:none; color:var(--text-muted); border:none; margin-top:16px; font-weight:700; cursor:pointer;" onclick="toggleModal('modal')">Close</button>
    </div>
</div>

<div id="delete-modal" class="modal-overlay">
    <div class="modal-content delete-confirm-box">
        <h3>Delete Record?</h3>
        <p>This action cannot be undone. Do you want to remove this task permanently?</p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="toggleModal('delete-modal')">Cancel</button>
            <button class="btn-confirm-del" id="confirm-delete-btn">Delete</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- DATA ----------
        let db = JSON.parse(localStorage.getItem('emp_db')) || [];
        let user = JSON.parse(localStorage.getItem('emp_user')) || { name: "Alex Rivera", id: "EMP-2026-08", pic: "https://ui-avatars.com/api/?name=Alex+Rivera&background=0D8ABC&color=fff" };
        let deleteTargetIdx = -1;

        // suggestion pools
        let companyNames = [];
        let pincodes = [];

        // ---------- HELPER FUNCTIONS (preserved) ----------
        function showToast(msg, isError = false) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.backgroundColor = isError ? "#ef4444" : "#334155";
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            if(id === 'modal' && m.style.display === 'flex') {
                document.getElementById('edit-name').value = user.name;
                document.getElementById('edit-emp-id').value = user.id;
                document.getElementById('edit-img').value = user.pic;
            }
        }

        function updateProfile() {
            user = {
                name: document.getElementById('edit-name').value || "User Name",
                id: document.getElementById('edit-emp-id').value || "ID-000",
                pic: document.getElementById('edit-img').value || `https://ui-avatars.com/api/?name=${document.getElementById('edit-name').value}`
            };
            localStorage.setItem('emp_user', JSON.stringify(user));
            renderProfile();
            toggleModal('modal');
            showToast("Profile Updated");
        }

        function renderProfile() {
            document.getElementById('disp-name').innerText = user.name;
            document.getElementById('disp-id').innerText = "ID: " + user.id;
            document.getElementById('disp-img').src = user.pic;
        }

        // forceCap: ensure first letter capital
        window.forceCap = function(input) { 
            if (input.value.length > 0) {
                input.value = input.value.charAt(0).toUpperCase() + input.value.slice(1);
            }
        };

        // ---------- UPDATE SUGGESTION POOLS ----------
        function updateSuggestionPools() {
            companyNames = [...new Set(db.map(t => t.comp).filter(Boolean))];
            pincodes = [...new Set(db.map(t => t.pin).filter(Boolean))];
        }

        // ---------- CUSTOM SUGGESTION HANDLERS ----------
        function hideAllSuggestions() {
            document.getElementById('company-suggestions').classList.remove('show');
            document.getElementById('pincode-suggestions').classList.remove('show');
        }

        function showSuggestions(input, list, boxId) {
            const box = document.getElementById(boxId);
            const val = input.value.trim();
            if (!val) { box.classList.remove('show'); return; }
            // case-insensitive match, max 3 items
            const matches = list.filter(item => item.toLowerCase().includes(val.toLowerCase())).slice(0, 3);
            if (matches.length === 0) { box.classList.remove('show'); return; }
            box.innerHTML = matches.map(m => `<div class="suggestion-item">${m}</div>`).join('');
            box.classList.add('show');
            // attach click listeners
            Array.from(box.children).forEach(div => {
                div.addEventListener('click', function(e) {
                    e.stopPropagation();
                    input.value = div.innerText;
                    // ensure first letter capital
                    forceCap(input);
                    hideAllSuggestions();
                });
            });
        }

        window.handleCompanyInput = function() {
            const inp = document.getElementById('company');
            showSuggestions(inp, companyNames, 'company-suggestions');
        };

        window.handlePincodeInput = function() {
            const inp = document.getElementById('pincode');
            showSuggestions(inp, pincodes, 'pincode-suggestions');
        };

        // close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-wrapper')) {
                hideAllSuggestions();
            }
        });

        // ---------- SAVE / EDIT / DELETE (preserve date on edit) ----------
        window.saveData = function() {
            const comp = document.getElementById('company').value.trim();
            const pin = document.getElementById('pincode').value.trim();
            const cntInput = document.getElementById('count').value;
            const cnt = parseInt(cntInput);
            const idx = parseInt(document.getElementById('edit-idx').value);

            if(!comp || !pin || cntInput === "" || isNaN(cnt) || cnt <= 0) {
                showToast("Please fill all fields correctly", true);
                return;
            }

            if(idx > -1) {
                // EDIT: preserve original time, only update fields
                db[idx].comp = comp;
                db[idx].pin = pin;
                db[idx].cnt = cnt;
                // time remains unchanged
                document.getElementById('edit-idx').value = "-1";
                document.getElementById('btn-text').innerText = "Save Entry";
                showToast("Record Updated");
            } else {
                // NEW: create with current time
                const item = { comp, pin, cnt, time: new Date().toISOString() };
                db.push(item);
                showToast("Entry Saved");
            }

            localStorage.setItem('emp_db', JSON.stringify(db));
            document.getElementById('company').value = '';
            document.getElementById('pincode').value = '';
            document.getElementById('count').value = '';

            updateSuggestionPools();
            renderHistory();
            runFilter();
            hideAllSuggestions();
        };

        window.deleteItem = function(idx) {
            deleteTargetIdx = idx;
            const confirmBtn = document.getElementById('confirm-delete-btn');
            confirmBtn.onclick = () => {
                db.splice(deleteTargetIdx, 1);
                localStorage.setItem('emp_db', JSON.stringify(db));
                updateSuggestionPools();
                renderHistory();
                runFilter();
                showToast("Record Deleted");
                toggleModal('delete-modal');
            };
            toggleModal('delete-modal');
        };

        window.editItem = function(idx) {
            const t = db[idx];
            document.getElementById('company').value = t.comp;
            document.getElementById('pincode').value = t.pin;
            document.getElementById('count').value = t.cnt;
            document.getElementById('edit-idx').value = idx;
            document.getElementById('btn-text').innerText = "Update Record";
            document.getElementById('task-card-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
            showToast("Editing Record...");
        };

        // ---------- RENDER HISTORY with alphabetical order and numbering, preserve date grouping ----------
        function renderHistory() {
            const container = document.getElementById('history-container');
            const now = new Date();
            let dTot = 0, mTot = 0;

            // compute today & this month totals (unchanged)
            db.forEach(t => {
                const tDate = new Date(t.time);
                if(tDate.toDateString() === now.toDateString()) dTot += t.cnt;
                if(tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear()) mTot += t.cnt;
            });
            document.getElementById('daily-total').innerText = dTot;
            document.getElementById('monthly-total').innerText = mTot;

            // group by month / day (preserve original time)
            const grouped = db.reduce((acc, t, index) => {
                const dt = new Date(t.time);
                const monthKey = dt.toLocaleString('default', { month: 'long', year: 'numeric' });
                const dateKey = dt.toLocaleDateString('default', { weekday: 'short', day: '2-digit', month: 'short' });
                if (!acc[monthKey]) acc[monthKey] = { total: 0, days: {} };
                if (!acc[monthKey].days[dateKey]) acc[monthKey].days[dateKey] = { total: 0, items: [] };
                acc[monthKey].total += t.cnt;
                acc[monthKey].days[dateKey].total += t.cnt;
                acc[monthKey].days[dateKey].items.push({...t, originalIdx: index});
                return acc;
            }, {});

            container.innerHTML = '';

            // months descending
            Object.keys(grouped).sort((a,b) => new Date(b) - new Date(a)).forEach(mKey => {
                const monthData = grouped[mKey];
                let daysHtml = '';

                // days descending
                Object.keys(monthData.days).sort((a,b) => new Date(b) - new Date(a)).forEach(dKey => {
                    const dayData = monthData.days[dKey];
                    // SORT items alphabetically by company name (case-insensitive)
                    const sortedItems = dayData.items.slice().sort((x,y) => x.comp.localeCompare(y.comp));
                    const itemsHtml = sortedItems.map((item, idx) => {
                        const d = new Date(item.time);
                        return `
                        <div class="record-item">
                            <div class="record-info">
                                <span class="number-badge">${idx+1}.</span>
                                <div class="record-content">
                                    <div class="company-name">${item.comp}</div>
                                    <div class="pin-line">Pin: ${item.pin} • ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                </div>
                            </div>
                            <div class="action-side">
                                <div class="record-count">${item.cnt}</div>
                                <button class="icon-btn edit-icon" onclick="editItem(${item.originalIdx})">✏️</button>
                                <button class="icon-btn delete-icon" onclick="deleteItem(${item.originalIdx})">🗑️</button>
                            </div>
                        </div>`;
                    }).join('');

                    daysHtml += `
                        <div class="day-group">
                            <div class="day-header" onclick="toggleSubSection(this)">
                                <span>📅 ${dKey}</span>
                                <span>${dayData.total} ▾</span>
                            </div>
                            <div class="day-content">
                                ${itemsHtml}
                            </div>
                        </div>`;
                });

                const monthSection = document.createElement('div');
                monthSection.className = 'month-card';
                monthSection.innerHTML = `
                    <div class="month-header" onclick="toggleSection(this)">
                        <div class="month-title">🗓 ${mKey}</div>
                        <div class="month-total-pill">${monthData.total} <span style="font-size:0.7rem;">▼</span></div>
                    </div>
                    <div class="history-list">
                        ${daysHtml}
                    </div>`;
                container.appendChild(monthSection);
            });
        }

        // toggle functions (unchanged)
        window.toggleSection = function(el) {
            const list = el.nextElementSibling;
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        };
        window.toggleSubSection = function(el) {
            const content = el.nextElementSibling;
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
        };

        // ---------- FILTER (month + pincode) with requested format ----------
        window.runFilter = function() {
            const pin = document.getElementById('filter-pin-input').value.trim();
            const monthVal = document.getElementById('filter-month').value; // YYYY-MM
            const out = document.getElementById('filter-output');

            if (!pin || !monthVal) {
                out.innerHTML = `<div style="color:var(--text-muted);">Enter pincode and select month</div>`;
                return;
            }

            const [year, month] = monthVal.split('-').map(Number); // month is 1-based

            // today's stats (based on current date)
            const now = new Date();
            const todayStr = now.toDateString();
            const dailyMatches = db.filter(t => t.pin == pin && new Date(t.time).toDateString() === todayStr);
            const dailyTotal = dailyMatches.reduce((sum, t) => sum + t.cnt, 0);
            const dailyCompanies = [...new Set(dailyMatches.map(t => t.comp))].join(', ') || 'None';

            // selected month stats
            const monthMatches = db.filter(t => {
                const d = new Date(t.time);
                return t.pin == pin && d.getFullYear() === year && d.getMonth() + 1 === month;
            });
            const monthTotal = monthMatches.reduce((sum, t) => sum + t.cnt, 0);
            const monthCompanies = [...new Set(monthMatches.map(t => t.comp))].join(', ') || 'None';

            // get month name from monthVal
            const monthDate = new Date(year, month-1, 1);
            const monthName = monthDate.toLocaleString('default', { month: 'long' });

            out.innerHTML = `
                <div><span style="font-weight:600;">Today's Total:</span> <b>${dailyTotal}</b></div>
                <div class="company-line">Companies: ${dailyCompanies}</div>
                <div style="margin-top:12px;"><span style="font-weight:600;">${monthName} Total:</span> <b>${monthTotal}</b></div>
                <div class="company-line">Companies: ${monthCompanies}</div>
            `;
        };

        // ---------- INIT ----------
        function setDefaultMonth() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            document.getElementById('filter-month').value = `${y}-${m}`;
        }

        function init() {
            setDefaultMonth();
            updateSuggestionPools();
            renderProfile();
            renderHistory();
            runFilter();
        }

        init();

        // expose to global for inline event handlers
        window.toggleModal = toggleModal;
        window.updateProfile = updateProfile;
    })();
</script>
</body>
</html>
